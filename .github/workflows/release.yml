name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.12.0). Must match plugin.json version.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Verify OpenCode package payload
        run: node tests/scripts/build-opencode.test.js

      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Validate version tag format
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version tag format. Expected vX.Y.Z, got: $TAG"
            exit 1
          fi

      - name: Verify plugin.json version matches tag
        run: |
          TAG_VERSION="${{ steps.resolve.outputs.version }}"
          PLUGIN_VERSION=$(grep -oE '"version": *"[^"]*"' .claude-plugin/plugin.json | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match plugin.json version ($PLUGIN_VERSION)"
            echo "Run: ./scripts/release.sh $TAG_VERSION"
            exit 1
          fi

      - name: Generate changelog since last tag
        id: highlights
        run: |
          TAG_VERSION="${{ steps.resolve.outputs.version }}"
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Group commits by type
          FEATURES=$(git log "$RANGE" --format="%s" | grep -E '^feat(\(.+\))?:' | sed 's/^feat[^:]*: /- /' || true)
          FIXES=$(git log "$RANGE" --format="%s" | grep -E '^fix(\(.+\))?:' | sed 's/^fix[^:]*: /- /' || true)
          CHORES=$(git log "$RANGE" --format="%s" | grep -E '^(chore|refactor|perf|ci|docs)(\(.+\))?:' | sed 's/^[^:]*: /- /' || true)
          BREAKING=$(git log "$RANGE" --format="%s%n%b" | grep -E '(BREAKING CHANGE|!:)' | sed 's/^/- /' || true)

          {
            echo "## VF-Claude-Plugin ${TAG_VERSION}"
            echo ""
            if [ -n "$BREAKING" ]; then
              echo "### Breaking Changes"
              echo "$BREAKING"
              echo ""
            fi
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$CHORES" ]; then
              echo "### Other Changes"
              echo "$CHORES"
              echo ""
            fi
            echo "---"
            echo "*Developers using the plugin will receive this update automatically on next session start after running \`claude plugin update\`.*"
          } > release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          body_path: release_body.md
          generate_release_notes: true
